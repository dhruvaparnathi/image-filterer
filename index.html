<!doctype html>
<html lang="en">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Editor</title>
  </head>
  <body>
    <main>
      <div id="center">
        <div id="leftbox">
          <div id="buttons">
            <label for="image-input" class="choosebtn"
              >Choose Image
              <input type="file" id="image-input" accept="image/*" hidden
            /></label>
            <button class="resetbtn">Reset</button>
            <button class="downloadbtn">Download</button>
          </div>

          <div id="imagecontainer">
            <canvas id="image-canvas"></canvas>
            <div id="noimg">
              <i class="ri-file-image-line"></i>
              <p>No image selected</p>
            </div>
          </div>
        </div>
        <div id="filterbox">
          <div id="filters">
            <h2>Filters</h2>
            <!-- <div class="filter">
                        <label for="brightness">Brightness</label>
                        <input type="range" id="brightness" min="0" max="200" value="100">
                    </div> -->
          </div>
          <div id="assets">
            <h2>Presets</h2>
            <button onclick="applyPreset('vintage')">Vintage</button>
            <button onclick="applyPreset('noir')">Noir</button>
            <button onclick="applyPreset('cyberpunk')">Cyberpunk</button>
            <button onclick="applyPreset('warmSunset')">Warm Sunset</button>
            <button onclick="applyPreset('coolTone')">Cool Tone</button>
            <button onclick="applyPreset('softGlow')">Soft Glow</button>
            <button onclick="applyPreset('retroPop')">Retro Pop</button>
          </div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
